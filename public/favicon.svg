<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <rect width="64" height="64" rx="14" fill="#12121A"/>

  <!-- Cube: top face -->
  <polygon points="32,10 50,20 32,30 14,20" fill="#4D9FFF" opacity="0.9"/>

  <!-- Cube: left face -->
  <polygon points="14,20 32,30 32,50 14,40" fill="#1a3a6e"/>

  <!-- Cube: right face -->
  <polygon points="50,20 32,30 32,50 50,40" fill="#2563b0"/>

  <!-- Edge highlight top-left -->
  <line x1="14" y1="20" x2="32" y2="10" stroke="#7cb9ff" stroke-width="1" opacity="0.6"/>
  <!-- Edge highlight top-right -->
  <line x1="32" y1="10" x2="50" y2="20" stroke="#7cb9ff" stroke-width="1" opacity="0.4"/>
</svg>