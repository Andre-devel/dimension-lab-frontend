<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />

    <!-- Favicon -->

    <link rel="icon" type="image/png" href="/favicon.png" sizes="64x64" />
    <link rel="apple-touch-icon" href="/favicon.png" />

    <!-- Primary meta (overridden per-page via react-helmet-async) -->
    <title>Dimension.Lab3D — Impressão 3D Personalizada</title>
    <meta name="description" content="Dimension.Lab3D — Impressão 3D profissional com PLA, PETG e resina. Orçamento gratuito em até 24h." />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph base -->
    <meta property="og:site_name" content="Dimension.Lab3D" />
    <meta property="og:locale" content="pt_BR" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Dimension.Lab3D — Impressão 3D Personalizada" />
    <meta property="og:description" content="Impressão 3D profissional com PLA, PETG e resina. Orçamento gratuito em até 24h." />
    <meta property="og:image" content="https://dimensionlab3d.com.br/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:url" content="https://dimensionlab3d.com.br" />

    <!-- Twitter Card base -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Dimension.Lab3D — Impressão 3D Personalizada" />
    <meta name="twitter:description" content="Impressão 3D profissional com PLA, PETG e resina. Orçamento gratuito em até 24h." />
    <meta name="twitter:image" content="https://dimensionlab3d.com.br/og-image.png" />

    <!-- Canonical base -->
    <link rel="canonical" href="https://dimensionlab3d.com.br" />

    <!-- Sitemap -->
    <link rel="sitemap" type="application/xml" href="https://dimensionlab3d.com.br/sitemap.xml" />

    <!-- Fonts — preconnect para reduzir latência -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Carregamento com display=swap para evitar FOIT -->
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;500&display=swap"
      rel="stylesheet"
    />
